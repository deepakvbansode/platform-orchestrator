apiVersion: score.dev/v1b1
metadata:
  name: platform-orchestrator

containers:
  server:
    image: docker.io/deepakbansode/platform-orchestrator:latest
    command:
      - /score-orchestrator
      - server
      - --config
      - /etc/orchestrator/orchestrator.yaml
      - --port
      - "8080"
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080

service:
  ports:
    http:
      port: 8080
      targetPort: 8080

resources:
  route:
    type: route
    params:
      path: /orchestrator
      port: 8080
